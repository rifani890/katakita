    <script>
        /**
         * Ultra-robust Fix for "Cannot set property fetch of #<Window> which has only a getter"
         * This happens in some sandboxed environments where window.fetch is read-only.
         */
        (function() {
            try {
                let currentFetch = window.fetch;
                Object.defineProperty(window, 'fetch', {
                    get: function() { return currentFetch; },
                    set: function(v) { 
                        console.log("Environment: fetch has been patched/wrapped.");
                        currentFetch = v; 
                    },
                    configurable: true,
                    enumerable: true
                });
                window.global = window;
            } catch (e) {
                // If defineProperty fails, we try a more direct approach if possible
                console.warn("Environmental fetch patch applied via fallback.");
            }
        })();
    </script>

    <script>
        // --- Constants & State ---
        const DB_BASE_URL = 'https://katakita-5b1d8-default-rtdb.asia-southeast1.firebasedatabase.app/newsList';
        const OFFICIAL_MAPPING = {
            "H. Budi Rustandi": { role: "Walikota Serang", color: "#0ea5e9" },
            "Nur Agis Aulia": { role: "Wakil Walikota Serang", color: "#fbbf24" },
            "Nanang Saefudin": { role: "Sekertaris Daerah Kota Serang", color: "#7c2d12" },
            "Nanang Sefudin": { role: "Sekertaris Daerah Kota Serang", color: "#7c2d12" },
            "Budi Rustandi": { role: "Walikota Serang", color: "#0ea5e9" },
            "Nanang": { role: "Sekertaris Daerah Kota Serang", color: "#7c2d12" },
            "Budi": { role: "Walikota Serang", color: "#0ea5e9" }
        };
        const MEDIA_MAPPING = {
            "Kabar Banten": { shorthand: "KB", color: "#16a34a" },
            "Radar Banten": { shorthand: "RB", color: "#2563eb" },
            "Banten Raya": { shorthand: "BR", color: "#991b1b" }
        };
        const MEDIA_TARGET = Object.keys(MEDIA_MAPPING);
        const MEDIA_SHORTHANDS = MEDIA_TARGET.map(m => MEDIA_MAPPING[m].shorthand);

        let allNewsData = [];
        let allUnitData = [];
        let allOfficialData = [];
        let allMediaData = []; // NEW
        let officialChartInstance = null;
        let trendChartInstance = null;

        /** Pagination & Search State */
        let currentPage = 1;
        let itemsPerPage = 10;
        let searchQuery = '';
        let sortField = 'tanggal_raw';
        let sortOrder = 'desc';

        function formatFullDate(dateVal) {
            const date = parseDate(dateVal);
            if (date.getTime() === 0) return '-';
            const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            return date.toLocaleDateString('id-ID', options);
        }

        /** Modal States */
        let activeNewsKey = null;
        let activeOfficialKey = null;

        // Init theme
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        document.getElementById('theme-toggle').addEventListener('click', () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            // Refresh charts colors after theme change
            if (allNewsData.length > 0) renderCharts();
        });

        // Tab Switching Logic
        window.switchTab = function(targetId) {
            // Update active state in sidebar
            document.querySelectorAll('.admin-tab').forEach(tab => {
                if (tab.dataset.target === targetId) {
                    tab.classList.add('text-blue-600', 'bg-blue-50', 'dark:bg-blue-900/20');
                    tab.classList.remove('text-slate-600', 'dark:text-slate-400', 'hover:bg-slate-50', 'dark:hover:bg-slate-800/50');
                } else {
                    tab.classList.remove('text-blue-600', 'bg-blue-50', 'dark:bg-blue-900/20');
                    tab.classList.add('text-slate-600', 'dark:text-slate-400', 'hover:bg-slate-50', 'dark:hover:bg-slate-800/50');
                }
            });

            // Update content visibility
            document.querySelectorAll('.admin-section').forEach(section => {
                if (section.id === `section-${targetId}`) {
                    section.classList.remove('hidden');
                    section.classList.add('block');
                } else {
                    section.classList.add('hidden');
                    section.classList.remove('block');
                }
            });

            // Close sidebar on mobile after selection
            if (window.innerWidth < 768) {
                toggleSidebar();
            }
        };

        // Sidebar Mobile Toggle
        window.toggleSidebar = function() {
            const sidebar = document.getElementById('admin-sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
            document.body.classList.toggle('overflow-hidden');
        };

        document.getElementById('mobile-sidebar-toggle').addEventListener('click', toggleSidebar);
        document.getElementById('sidebar-overlay').addEventListener('click', toggleSidebar);

        // Global Loading Logic
        window.showLoading = function(text = "Memuat...") {
            const el = document.getElementById('global-loading');
            const txt = document.getElementById('global-loading-text');
            if (el && txt) {
                txt.innerText = text;
                el.classList.remove('hidden');
                el.classList.add('flex');
                setTimeout(() => el.classList.add('opacity-100'), 10);
            }
        };

        window.hideLoading = function(success = false) {
            const el = document.getElementById('global-loading');
            const txt = document.getElementById('global-loading-text');
            if (el) {
                if (success && txt) {
                    txt.innerText = "Selesai!";
                    const icon = el.querySelector('.animate-spin');
                    if (icon) {
                        icon.classList.remove('animate-spin', 'border-t-blue-600', 'dark:border-t-blue-500');
                        icon.classList.add('border-emerald-500', 'bg-emerald-500', 'flex', 'items-center', 'justify-center');
                        icon.innerHTML = '<i class="fas fa-check text-white text-xl"></i>';
                    }
                    setTimeout(() => {
                        el.classList.remove('opacity-100');
                        setTimeout(() => {
                            el.classList.add('hidden');
                            el.classList.remove('flex', 'flex-col');
                            // Reset for next time
                            if (icon) {
                                icon.classList.add('animate-spin', 'border-t-blue-600', 'dark:border-t-blue-500');
                                icon.classList.remove('border-emerald-500', 'bg-emerald-500', 'flex', 'items-center', 'justify-center');
                                icon.innerHTML = '';
                            }
                        }, 300);
                    }, 800);
                } else {
                    el.classList.remove('opacity-100');
                    setTimeout(() => {
                        el.classList.add('hidden');
                        el.classList.remove('flex');
                    }, 300);
                }
            }
        };

        window.customConfirm = function(title, message, options = {}) {
            return new Promise((resolve) => {
                const modal = document.getElementById('confirm-modal');
                const content = document.getElementById('confirm-modal-content');
                const titleEl = document.getElementById('confirm-modal-title');
                const msgEl = document.getElementById('confirm-modal-message');
                const okBtn = document.getElementById('confirm-ok');
                const cancelBtn = document.getElementById('confirm-cancel');
                const iconContainer = modal.querySelector('.text-3xl');
                const icon = iconContainer.querySelector('i');

                titleEl.innerText = title;
                msgEl.innerText = message;
                
                // Theme defaults
                const theme = options.type === 'info' ? {
                    icon: 'fa-save',
                    iconBg: 'bg-blue-100 dark:bg-blue-900/30',
                    iconText: 'text-blue-600 dark:text-blue-400',
                    btnBg: 'bg-blue-600 hover:bg-blue-700 shadow-blue-500/30',
                    btnText: 'Simpan',
                    bounce: false
                } : options.type === 'warn' ? {
                    icon: 'fa-sign-out-alt',
                    iconBg: 'bg-amber-100 dark:bg-amber-900/30',
                    iconText: 'text-amber-600 dark:text-amber-400',
                    btnBg: 'bg-amber-600 hover:bg-amber-700 shadow-amber-500/30',
                    btnText: 'Keluar',
                    bounce: false
                } : {
                    icon: 'fa-trash-alt',
                    iconBg: 'bg-rose-100 dark:bg-rose-900/30',
                    iconText: 'text-rose-600 dark:text-rose-400',
                    btnBg: 'bg-rose-600 hover:bg-rose-700 shadow-rose-500/30',
                    btnText: 'Ya, Hapus',
                    bounce: true
                };

                icon.className = `fas ${theme.icon} ${theme.bounce ? 'animate-bounce' : ''}`;
                iconContainer.className = `w-20 h-20 ${theme.iconBg} ${theme.iconText} rounded-full flex items-center justify-center text-3xl mb-2`;
                okBtn.className = `flex-1 btn ${theme.btnBg} text-white py-4 text-lg font-bold`;
                okBtn.innerText = theme.btnText;

                modal.classList.remove('hidden');
                modal.classList.add('flex');
                setTimeout(() => {
                    modal.classList.add('opacity-100');
                    content.classList.remove('translate-y-4');
                }, 10);

                const cleanup = (result) => {
                    modal.classList.remove('opacity-100');
                    content.classList.add('translate-y-4');
                    setTimeout(() => {
                        modal.classList.add('hidden');
                        modal.classList.remove('flex');
                    }, 300);
                    resolve(result);
                };

                cancelBtn.onclick = () => cleanup(false);
                okBtn.onclick = () => cleanup(true);
            });
        };

        /** Utility for Sequential IDs */
        function getNextId(dataArray) {
            if (!dataArray || dataArray.length === 0) return 1;
            const ids = dataArray.map(item => {
                const k = item.key || '';
                const num = parseInt(k.replace(/[^0-9]/g, ''));
                return isNaN(num) ? 0 : num;
            });
            return Math.max(...ids) + 1;
        }

        /** Fetch data from Firebase */
        async function fetchData() {
            try {
                let rawData, unitData, officialData, mediaData;
                if (window.fetchFirebaseData) {
                    rawData = await window.fetchFirebaseData('newsList');
                    unitData = await window.fetchFirebaseData('unitKerja');
                    officialData = await window.fetchFirebaseData('pejabat');
                    mediaData = await window.fetchFirebaseData('mediaList');
                } else {
                    const ts = new Date().getTime();
                    const [resNews, resUnit, resOfficial, resMedia] = await Promise.all([
                        fetch(`${DB_BASE_URL}.json?_t=${ts}`),
                        fetch(`${DB_BASE_URL.replace('newsList', 'unitKerja')}.json?_t=${ts}`),
                        fetch(`${DB_BASE_URL.replace('newsList', 'pejabat')}.json?_t=${ts}`),
                        fetch(`${DB_BASE_URL.replace('newsList', 'mediaList')}.json?_t=${ts}`)
                    ]);
                    rawData = await resNews.json();
                    unitData = await resUnit.json();
                    officialData = await resOfficial.json();
                    mediaData = await resMedia.json();
                }

                allNewsData = rawData ? Object.keys(rawData).map(k => ({ key: k, ...rawData[k] })).sort((a,b) => (b.tanggal_raw||0) - (a.tanggal_raw||0)) : [];
                allUnitData = unitData ? Object.keys(unitData).map(k => {
                    const val = unitData[k];
                    return (typeof val === 'string') ? { key: k, unit: val, nama: val } : { key: k, ...val };
                }) : [];
                allOfficialData = officialData ? Object.keys(officialData).map(k => {
                    const val = officialData[k];
                    return (typeof val === 'string') ? { key: k, nama: val } : { key: k, ...val };
                }) : [];
                allMediaData = mediaData ? Object.keys(mediaData).map(k => ({ key: k, ...mediaData[k] })) : [];

                renderCharts();
                updateAdminLists();

            } catch (error) {
                console.error("fetchData Error:", error);
            }
        }

        window.updateAdminLists = function() {
            // Update Unit Cards
            const unitList = document.getElementById('admin-unit-list');
            if (unitList) {
                if (allUnitData.length === 0) {
                    unitList.innerHTML = '<div class="col-span-full py-8 text-center text-slate-400 bg-slate-50 dark:bg-slate-800/50 rounded-xl border-2 border-dashed border-slate-200">Belum ada unit kerja.</div>';
                } else {
                    unitList.innerHTML = allUnitData.map(unit => `
                        <div class="p-4 bg-slate-50 dark:bg-slate-800/30 rounded-xl border border-slate-100 dark:border-slate-800 flex justify-between items-center group">
                            <div class="flex flex-col">
                                <span class="font-bold text-slate-700 dark:text-slate-200">${unit.unit || unit.nama || unit.name || 'Unit'}</span>
                                <span class="text-xs text-slate-500 flex items-center gap-1">
                                    <i class="fas fa-user-tie text-[10px]"></i>
                                    Pimpinan: ${unit.pimpinan || '-'}
                                </span>
                            </div>
                            <div class="flex gap-1">
                                <button onclick="editUnit('${unit.key}')" class="p-3 text-blue-500 hover:bg-blue-50 rounded-lg"><i class="fas fa-edit"></i></button>
                                <button onclick="deleteItem('unitKerja', '${unit.key}')" class="p-3 text-rose-500 hover:bg-rose-50 rounded-lg"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    `).join('');
                }
            }

            // Update Official Cards
            const officialList = document.getElementById('admin-official-list');
            if (officialList) {
                if (allOfficialData.length === 0) {
                    officialList.innerHTML = '<div class="col-span-full py-8 text-center text-slate-400 bg-slate-50 dark:bg-slate-800/50 rounded-xl border-2 border-dashed border-slate-200">Belum ada pejabat.</div>';
                } else {
                    officialList.innerHTML = allOfficialData.map(off => `
                        <div class="p-4 bg-slate-50 dark:bg-slate-800/30 rounded-xl border border-slate-100 dark:border-slate-800 flex justify-between items-center group">
                            <div class="flex flex-col">
                                <span class="font-bold text-slate-700 dark:text-slate-200">${off.nama || off.name || 'Tanpa Nama'}</span>
                                <div class="flex items-center gap-2">

                            font: { weight: '900', family: 'Poppins', size: 12 },
                            formatter: (value, ctx) => {
                                let sum = 0;
                                let dataArr = ctx.chart.data.datasets[0].data;
                                dataArr.forEach(data => { sum += data; });
                                let percentage = (value*100 / sum).toFixed(0)+"%";

        function renderTrendChart() {
            const trendFilterEl = document.getElementById('trend-filter');
            if (!trendFilterEl) return;
            const filterType = trendFilterEl.value;
            const isDarkMode = document.body.classList.contains('dark');
            const textColor = isDarkMode ? '#cbd5e1' : '#475569';
            const gridColor = isDarkMode ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';

            const timelineData = {}; 
            allNewsData.forEach(n => {
                if (!MEDIA_TARGET.includes(n.media)) return;
                const date = parseDate(n.tanggal_raw);
                if (isNaN(date.getTime())) return; 
                
                let timeKey;
                if (filterType === 'weekly') {
                    const tempDate = new Date(date);
                    const day = tempDate.getDay(), diff = tempDate.getDate() - day + (day == 0 ? -6:1);
                    const weekStart = new Date(tempDate.setDate(diff));
                    timeKey = weekStart.toISOString().split('T')[0];
                } else {
                    timeKey = `${date.getFullYear()}-${(date.getMonth() + 1).toString().padStart(2, '0')}`;
                }

                if (!timelineData[timeKey]) {
                    timelineData[timeKey] = {};
                    MEDIA_SHORTHANDS.forEach(s => timelineData[timeKey][s] = 0);
                }
                const shorthand = MEDIA_MAPPING[n.media].shorthand;
                timelineData[timeKey][shorthand]++;
            });

            const sortedKeys = Object.keys(timelineData).sort();
            const labels = sortedKeys.map(k => {
                const date = new Date(k);
                return filterType === 'monthly' 
                    ? date.toLocaleDateString('id-ID', { month: 'short', year: 'numeric' })
                    : date.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
            });

            const datasets = MEDIA_SHORTHANDS.map((shorthand, idx) => {
                const mediaColor = Object.values(MEDIA_MAPPING).find(m => m.shorthand === shorthand).color;
                return {
                    label: shorthand,
                    data: sortedKeys.map(k => timelineData[k][shorthand]),
                    borderColor: mediaColor,
                    backgroundColor: mediaColor + '22',
                    fill: false,
                    tension: 0.4,
                    pointRadius: 4,
                    borderWidth: 2
                };
            });

            if (trendChartInstance) trendChartInstance.destroy();
            const ctxTrendCanvas = document.getElementById('trend-chart');
            if (!ctxTrendCanvas) return;
            const ctxTrend = ctxTrendCanvas.getContext('2d');

            trendChartInstance = new Chart(ctxTrend, {
                type: 'line',
                data: { labels, datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { color: textColor } }
                    },
                    scales: {
                        x: { ticks: { color: textColor }, grid: { display: false } },
                        y: { 
                            beginAtZero: true, 
                            ticks: { color: textColor, stepSize: 1 },
                            grid: { color: gridColor }
                        }
                    }
                }
            });
        }

        // --- Helper Functions ---
        function parseDate(dateVal) {
            if (!dateVal) return new Date(0);
            const d = new Date(dateVal);
            return isNaN(d.getTime()) ? new Date(0) : d;
        }

        function formatDate(dateVal) {
            const date = parseDate(dateVal);
            if (date.getTime() === 0) return "-";
            const options = { weekday: 'long', year: 'numeric', month: 'short', day: 'numeric' };
            try {
                let formatted = date.toLocaleDateString('id-ID', options);
                return formatted.replace(/\w\S*/g, (w) => (w.replace(/^\w/, (c) => c.toUpperCase())));
            } catch (e) {
                return "-";
            }
        }

        function getOfficialMapping(rawName) {
            if (!rawName) return null;
            // Handle array if provided
            const name = Array.isArray(rawName) ? (rawName[0] || '') : String(rawName);
            const nameLower = name.toLowerCase();
            if (OFFICIAL_MAPPING[name]) return OFFICIAL_MAPPING[name];
            if (nameLower.includes("budi rustandi") || nameLower === "budi" || nameLower.includes("h. budi")) return OFFICIAL_MAPPING["H. Budi Rustandi"];
            if (nameLower.includes("agis aulia") || nameLower.includes("nur agis")) return OFFICIAL_MAPPING["Nur Agis Aulia"];
            if (nameLower.includes("nanang saefudin") || nameLower.includes("nanang sefudin") || nameLower === "nanang") return OFFICIAL_MAPPING["Nanang Saefudin"];
            return null;
        }

        <a href="/admin/berita.html" class="relative -top-[1.35rem] w-[3.75rem] h-[3.75rem] rounded-full bg-blue-600 shadow-[0_4px_15px_rgba(37,99,235,0.4)] text-white flex items-center justify-center border-[7px] border-slate-50 dark:border-dark-bg hover:bg-blue-700 hover:scale-105 transition-transform overflow-hidden mx-0.5 flex-shrink-0">
            <i class="fas fa-newspaper absolute inset-0 w-full h-full text-[2.2rem] opacity-20 flex items-center justify-center pointer-events-none mt-1"></i>
            <i class="fas fa-plus relative z-10 text-lg font-bold"></i>
        </a>

        <!-- Unit Kerja -->
        <a href="/admin/unit.html" class="flex flex-col items-center justify-center text-slate-400 hover:text-blue-600 dark:text-slate-500 dark:hover:text-blue-400 transition-colors">
            <i class="fas fa-building text-[1.35rem]"></i>
        </a>
        <!-- Pejabat -->
        <a href="/admin/pejabat.html" class="flex flex-col items-center justify-center text-slate-400 hover:text-blue-600 dark:text-slate-500 dark:hover:text-blue-400 transition-colors">
            <i class="fas fa-user-tie text-[1.35rem]"></i>
        </a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const bottomNav = document.getElementById('mobile-bottom-nav');
            const scrollContainer = document.querySelector('main.overflow-y-auto');
            if (bottomNav && scrollContainer) {
                let lastScrollY = scrollContainer.scrollTop;
                scrollContainer.addEventListener('scroll', () => {
                    const currentScrollY = scrollContainer.scrollTop;
                    if (currentScrollY > lastScrollY && currentScrollY > 10) {
                        bottomNav.classList.add('translate-y-24', 'opacity-0');
                    } else {
                        bottomNav.classList.remove('translate-y-24', 'opacity-0');
                    }
                    lastScrollY = currentScrollY;
                }, { passive: true });
            }
        });
    </script>

    <!-- Confirm Modal -->
    <div id="confirm-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[9990] hidden flex-col items-center justify-center transition-all duration-300 opacity-0 px-4">
        <div class="bg-white dark:bg-dark-card p-8 rounded-3xl shadow-2xl w-full max-w-sm flex flex-col gap-8 border border-slate-200 dark:border-slate-800 translate-y-4 transition-all duration-300" id="confirm-modal-content">
            <div class="flex flex-col items-center text-center gap-4">
                <div class="w-20 h-20 bg-rose-100 dark:bg-rose-900/30 text-rose-600 dark:text-rose-400 rounded-full flex items-center justify-center text-3xl mb-2">
                    <i class="fas fa-trash-alt animate-bounce"></i>
                </div>
                <div>
                    <h3 class="text-2xl font-black text-slate-800 dark:text-white" id="confirm-modal-title">Hapus Data?</h3>
                    <p class="text-slate-500 dark:text-slate-400 mt-2 leading-relaxed" id="confirm-modal-message">Apakah Anda yakin ingin menghapus data ini? Tindakan ini tidak dapat dibatalkan.</p>
                </div>
            </div>
            <div class="flex gap-4">
                <button id="confirm-cancel" class="flex-1 btn bg-slate-100 hover:bg-slate-200 text-slate-700 dark:bg-slate-800 dark:hover:bg-slate-700 dark:text-slate-300 py-4 text-lg">
                    Batal
                </button>
                <button id="confirm-ok" class="flex-1 btn bg-rose-600 hover:bg-rose-700 text-white shadow-lg shadow-rose-500/30 py-4 text-lg font-bold">
                    Ya, Hapus
                </button>
            </div>
        </div>
    </div>

    <!-- Global Loading Overlay -->
    <div id="global-loading" class="fixed inset-0 bg-slate-900/70 backdrop-blur-md z-[9999] hidden flex-col items-center justify-center transition-all duration-300 opacity-0 px-4">
        <div class="bg-white/90 dark:bg-dark-card/90 p-10 rounded-3xl shadow-2xl flex flex-col items-center gap-6 border border-slate-200 dark:border-slate-800 max-w-xs w-full">
            <div class="relative w-20 h-20">
                <div class="absolute inset-0 animate-ping rounded-full bg-blue-500/20"></div>
                <div class="relative flex items-center justify-center w-full h-full">
                    <div class="animate-spin rounded-full h-16 w-16 border-[5px] border-slate-200 dark:border-slate-700 border-t-blue-600 dark:border-t-blue-500"></div>
                </div>
            </div>
            <p id="global-loading-text" class="text-slate-700 dark:text-slate-300 font-bold text-xl text-center">Sedang Memproses...</p>
        </div>
    </div>
</body>
