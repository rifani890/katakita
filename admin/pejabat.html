    <script>
        (function() {
            try {
                let currentFetch = window.fetch;
                Object.defineProperty(window, 'fetch', {
                    get: function() { return currentFetch; },
                    set: function(v) { currentFetch = v; },
                    configurable: true,
                    enumerable: true
                });
                window.global = window;
            } catch (e) {
                console.warn("Environmental fetch patch applied via fallback.");
            }
        })();
    </script>

    </script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const bottomNav = document.getElementById('mobile-bottom-nav');
            const scrollContainer = document.querySelector('main.overflow-y-auto');
            if (bottomNav && scrollContainer) {
                let lastScrollY = scrollContainer.scrollTop;
                scrollContainer.addEventListener('scroll', () => {
                    const currentScrollY = scrollContainer.scrollTop;
                    if (currentScrollY > lastScrollY && currentScrollY > 10) {
                        bottomNav.classList.add('translate-y-24', 'opacity-0');
                    } else {
                        bottomNav.classList.remove('translate-y-24', 'opacity-0');
                    }
                    lastScrollY = currentScrollY;
                }, { passive: true });
            }
        });
    </script>

    <script type="module" src="/src/auth.ts"></script>
    <script>
        // Global Loading Logic
        window.showLoading = function(text = "Memuat...") {
            const el = document.getElementById('global-loading');
            const txt = document.getElementById('global-loading-text');
            if (el && txt) {
                txt.innerText = text;
                el.classList.remove('hidden');
                el.classList.add('flex');
                setTimeout(() => el.classList.add('opacity-100'), 10);
            }
        };

        window.hideLoading = function(success = false) {
            const el = document.getElementById('global-loading');
            const txt = document.getElementById('global-loading-text');
            if (el) {
                if (success && txt) {
                    txt.innerText = "Selesai!";
                    const icon = el.querySelector('.animate-spin');
                    if (icon) {
                        icon.classList.remove('animate-spin', 'border-t-blue-600', 'dark:border-t-blue-500');
                        icon.classList.add('border-emerald-500', 'bg-emerald-500', 'flex', 'items-center', 'justify-center');
                        icon.innerHTML = '<i class="fas fa-check text-white text-xl"></i>';
                    }
                    setTimeout(() => {
                        el.classList.remove('opacity-100');
                        setTimeout(() => {
                            el.classList.add('hidden');
                            el.classList.remove('flex', 'flex-col');
                            // Reset for next time
                            if (icon) {
                                icon.classList.add('animate-spin', 'border-t-blue-600', 'dark:border-t-blue-500');
                                icon.classList.remove('border-emerald-500', 'bg-emerald-500', 'flex', 'items-center', 'justify-center');
                                icon.innerHTML = '';
                            }
                        }, 300);
                    }, 800);
                } else {
                    el.classList.remove('opacity-100');
                    setTimeout(() => {
                        el.classList.add('hidden');
                        el.classList.remove('flex');
                    }, 300);
                }
            }
        };

        window.customConfirm = function(title, message, options = {}) {
            return new Promise((resolve) => {
                const modal = document.getElementById('confirm-modal');
                const content = document.getElementById('confirm-modal-content');
                const titleEl = document.getElementById('confirm-modal-title');
                const msgEl = document.getElementById('confirm-modal-message');
                const okBtn = document.getElementById('confirm-ok');
                const cancelBtn = document.getElementById('confirm-cancel');
                const iconContainer = modal.querySelector('.text-3xl');
                const icon = iconContainer.querySelector('i');

                titleEl.innerText = title;
                msgEl.innerText = message;
                
                // Theme defaults
                const theme = options.type === 'info' ? {
                    icon: 'fa-save',
                    iconBg: 'bg-blue-100 dark:bg-blue-900/30',
                    iconText: 'text-blue-600 dark:text-blue-400',
                    btnBg: 'bg-blue-600 hover:bg-blue-700 shadow-blue-500/30',
                    btnText: 'Simpan',
                    bounce: false
                } : options.type === 'warn' ? {
                    icon: 'fa-sign-out-alt',
                    iconBg: 'bg-amber-100 dark:bg-amber-900/30',
                    iconText: 'text-amber-600 dark:text-amber-400',
                    btnBg: 'bg-amber-600 hover:bg-amber-700 shadow-amber-500/30',
                    btnText: 'Keluar',
                    bounce: false
                } : {
                    icon: 'fa-trash-alt',
                    iconBg: 'bg-rose-100 dark:bg-rose-900/30',
                    iconText: 'text-rose-600 dark:text-rose-400',
                    btnBg: 'bg-rose-600 hover:bg-rose-700 shadow-rose-500/30',
                    btnText: 'Ya, Hapus',
                    bounce: true
                };

                icon.className = `fas ${theme.icon} ${theme.bounce ? 'animate-bounce' : ''}`;
                iconContainer.className = `w-20 h-20 ${theme.iconBg} ${theme.iconText} rounded-full flex items-center justify-center text-3xl mb-2`;
                okBtn.className = `flex-1 btn ${theme.btnBg} text-white py-4 text-lg font-bold`;
                okBtn.innerText = theme.btnText;

                modal.classList.remove('hidden');
                modal.classList.add('flex');
                setTimeout(() => {
                    modal.classList.add('opacity-100');
                    content.classList.remove('translate-y-4');
                }, 10);

                const cleanup = (result) => {
                    modal.classList.remove('opacity-100');
                    content.classList.add('translate-y-4');
                    setTimeout(() => {
                        modal.classList.add('hidden');
                        modal.classList.remove('flex');
                    }, 300);
                    resolve(result);
                };

                cancelBtn.onclick = () => cleanup(false);
                okBtn.onclick = () => cleanup(true);
            });
        };

        let allOfficialData = [];
        let activeOfficialKey = null;

        /** Utility */
        function getNextId(dataArray) {
            if (!dataArray || dataArray.length === 0) return 1;
            const ids = dataArray.map(item => parseInt((item.key || '').replace(/[^0-9]/g, '')) || 0);
            return Math.max(...ids) + 1;
        }

        async function fetchData() {
            if (!window.fetchFirebaseData) return;
            try {
                const res = await window.fetchFirebaseData('pejabat');
                allOfficialData = res ? Object.keys(res).map(k => {
                    const val = res[k];
                    return (typeof val === 'string') ? { key: k, nama: val } : { key: k, ...val };
                }) : [];
                renderList();
            } catch (err) { console.error(err); }
        }

        function renderList() {
            const list = document.getElementById('admin-official-list');
            if (allOfficialData.length === 0) {
                list.innerHTML = '<tr><td colspan="5" class="px-6 py-8 text-center text-slate-400 bg-slate-50 dark:bg-slate-800/20 italic">Belum ada pejabat.</td></tr>';
                return;
            }
            list.innerHTML = allOfficialData.map((off, index) => `
                <tr class="hover:bg-blue-50 dark:hover:bg-slate-700/60 transition-colors group divide-x divide-slate-200 dark:divide-slate-700/50 cursor-default">
                    <td class="px-6 py-4 text-slate-500 font-medium text-center align-top whitespace-normal break-words">${index + 1}</td>
                    <td class="px-6 py-4 align-top whitespace-normal break-words">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-amber-100 dark:bg-amber-900/30 text-amber-600 dark:text-amber-400 flex items-center justify-center font-bold shrink-0">
                                ${(off.nama || off.name || 'N')[0].toUpperCase()}
                            </div>
                            <div>
                                <div class="font-bold text-slate-800 dark:text-white text-base">${off.nama || off.name || 'Nama'}</div>
                                <div class="text-xs text-slate-400 font-mono mt-0.5">${off.key}</div>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-4 align-top whitespace-normal break-words">
                        <span class="text-slate-600 dark:text-slate-300 font-medium whitespace-normal break-words">${off.jabatan || off.role || '-'}</span>
                    </td>
                    <td class="px-6 py-4 text-center align-top whitespace-normal break-words">
                        <span class="px-3 py-1 text-xs font-semibold rounded-full border ${
                            (off.jk === 'Perempuan' || off.jenisKelamin === 'Perempuan') 
                            ? 'bg-pink-50 border-pink-200 text-pink-600 dark:bg-pink-900/20 dark:border-pink-800/50 dark:text-pink-400' 
                            : 'bg-blue-50 border-blue-200 text-blue-600 dark:bg-blue-900/20 dark:border-blue-800/50 dark:text-blue-400'
                        }">
                            ${off.jk || off.jenisKelamin || '-'}
                        </span>
                    </td>
                    <td class="px-6 py-4 align-top whitespace-normal break-words">
                        <div class="flex items-center justify-center gap-2 flex-wrap">
                            <button onclick="openOfficialModal('${off.key}')" class="w-9 h-9 rounded-lg flex items-center justify-center text-blue-500 hover:bg-blue-50 dark:hover:bg-blue-900/30 transition-colors tooltip shrink-0" title="Edit">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button onclick="deleteOfficial('${off.key}')" class="w-9 h-9 rounded-lg flex items-center justify-center text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-900/30 transition-colors tooltip shrink-0" title="Hapus">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        window.openOfficialModal = (key = null) => {
            activeOfficialKey = key;
            const modal = document.getElementById('official-modal');
            const title = document.getElementById('official-modal-title');
            const nameInput = document.getElementById('modal-off-name');
            const roleInput = document.getElementById('modal-off-role');
            
            if (key) {
                const data = allOfficialData.find(o => o.key === key);
                title.innerText = "Edit Pejabat";
                nameInput.value = data.nama || data.name || '';
                roleInput.value = data.jabatan || data.role || '';
                const jkVal = data.jk || data.jenisKelamin || 'Laki-laki';
                document.querySelector(`input[name="jk"][value="${jkVal}"]`).checked = true;
            } else {
                title.innerText = "Tambah Pejabat";
                nameInput.value = '';
                roleInput.value = '';
                document.querySelector('input[name="jk"][value="Laki-laki"]').checked = true;
            }
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                modal.classList.add('opacity-100');
                document.getElementById('official-modal-content').classList.remove('scale-95');
            }, 10);
        };

        window.closeOfficialModal = () => {
            const modal = document.getElementById('official-modal');
            modal.classList.remove('opacity-100');
            document.getElementById('official-modal-content').classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 300);
        };

        window.saveOfficial = async () => {
            const name = document.getElementById('modal-off-name').value.trim();
            const role = document.getElementById('modal-off-role').value.trim();
            const jk = document.querySelector('input[name="jk"]:checked').value;
            if (!name) return;
            
            const action = activeOfficialKey ? "memperbarui" : "menambahkan";
            const ok = await window.customConfirm("Konfirmasi Simpan", `Apakah Anda yakin ingin ${action} data pejabat ini?`, { type: 'info' });
            if (!ok) return;

            window.showLoading("Menyimpan...");
            try {
                const key = activeOfficialKey || getNextId(allOfficialData).toString();
                const data = {};
                data[key] = { nama: name, jabatan: role, jk: jk };
                await window.updateFirebaseData('pejabat', data);
                closeOfficialModal();
                await fetchData();
                window.hideLoading(true);
            } catch (err) { alert(err.message); window.hideLoading(); }
        };

        window.deleteOfficial = async (key) => {
            const ok = await window.customConfirm("Hapus Pejabat", "Hapus data pejabat ini?");
            if (!ok) return;
            window.showLoading("Menghapus...");
            try {
                await window.deleteFirebaseData('pejabat', key);
                await fetchData();
                window.hideLoading(true);
            } catch (err) { alert(err.message); window.hideLoading(); }
        };

        window.toggleSidebar = () => {
            document.getElementById('admin-sidebar').classList.toggle('-translate-x-full');
            document.getElementById('sidebar-overlay').classList.toggle('hidden');
        };
        document.getElementById('mobile-sidebar-toggle').addEventListener('click', toggleSidebar);
        document.getElementById('sidebar-overlay').addEventListener('click', toggleSidebar);
        document.getElementById('theme-toggle').onclick = () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        };

        window.addEventListener('firebaseReady', fetchData);
        setTimeout(() => { if (allOfficialData.length === 0) fetchData(); }, 2000);
    </script>
</body>
</html>
